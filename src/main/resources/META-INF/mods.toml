modLoader="javafml"
loaderVersion="${loader_version_range}"

license="GPL-3.0"
issueTrackerURL="https://github.com/Camawama/GrappleVS/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/Camawama/GrappleVS"
authors="${mod_authors}"
description='''${mod_description}'''
logoFile="icon.png"

[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
    modId="cloth_config"
    mandatory=true
    versionRange="[11,12)"
    ordering="NONE"
    side="BOTH"

# Optional integration; tested against VS 2.4.x. The integration uses some VS-internal API,
# so bump this range deliberately after testing against newer VS releases.
[[dependencies.${mod_id}]]
    modId="valkyrienskies"
    mandatory=false
    versionRange="[2.4.0,2.5.0)"
    ordering="AFTER"
    side="BOTH"
